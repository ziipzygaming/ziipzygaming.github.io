<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ziipzy — vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        /* --- CORE SYSTEM --- */
        * { box-sizing: border-box; margin: 0; padding: 0; text-transform: lowercase; }
        :root { 
            --bg: #080808; 
            --card-bg: #111; 
            --text: #ffffff; 
            --accent: #ff3e00; 
            --border: rgba(255,255,255,0.08);
        }

        .ziipzy-text, h1, h2, .ui-btn, .copyright, .exit-btn, .motto b, .label, .gen-button, .status-text, .history-btn, .reveal-box h1, .history-label { 
            text-transform: uppercase !important; 
        }

        /* --- FOOTER LOWERCASE OVERRIDE --- */
        footer, footer *, footer .motto b, footer .reveal-box h1, footer .copyright { 
            text-transform: lowercase !important; 
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; overflow-x: hidden;
            line-height: 1.1; scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        /* --- UI COMPONENTS --- */
        #top-scroll-bar { position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: var(--accent); z-index: 1000000; }
        #smooth-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; overflow: hidden; }
        #smooth-content { width: 100%; will-change: transform; display: flex; flex-direction: column; }

        .grid-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 120%; 
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px; z-index: -1;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        .exit-btn { 
            position: fixed; top: 30px; left: 30px; z-index: 1000;
            background: #fff; color: #000; padding: 12px 20px; 
            font-size: 0.6rem; font-weight: 900; letter-spacing: 0.2em;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; border: none;
        }
        .exit-btn:hover { background: var(--accent); color: #fff; transform: translateX(10px); }

        /* --- SLIDING HISTORY PANEL (RIGHT) --- */
        .history-panel {
            position: fixed; right: -320px; top: 50%; transform: translateY(-50%);
            z-index: 2000; display: flex; align-items: center;
            transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .history-panel.active { right: 0; }

        .history-btn {
            background: #fff; color: #000; padding: 25px 10px;
            writing-mode: vertical-rl; font-size: 0.6rem; font-weight: 900;
            letter-spacing: 0.2em; cursor: pointer; border: none; transition: 0.3s;
        }
        .history-btn:hover { background: var(--accent); color: #fff; }

        .history-content {
            width: 320px; height: 450px; background: #111; border: 1px solid var(--border);
            border-right: 4px solid var(--accent); padding: 30px; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .history-label { font-size: 0.6rem; font-weight: 900; opacity: 0.3; }
        .clear-history { font-size: 0.5rem; opacity: 0.3; cursor: pointer; }
        .history-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; scrollbar-width: none; flex-grow: 1; }
        .history-item { 
            background: #000; padding: 12px; border: 1px solid var(--border);
            cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .history-item:hover { border-color: var(--accent); }
        .history-string { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #fff; text-transform: none !important; }

        /* --- VAULT GENERATOR --- */
        .content-zone { padding: 120px 5% 100px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .vault-container {
            width: 100%; max-width: 500px; background: var(--card-bg); border: 1px solid var(--border); padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); position: relative; z-index: 10;
        }
        .output-box { 
            background: #000; padding: 40px 20px; margin-bottom: 5px; 
            border: 1px solid var(--border); text-align: center; 
            transition: background 0.6s ease, border-color 0.6s ease;
        }
        .gen-output { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 800; color: #fff; text-transform: none !important; word-break: break-all; }
        
        .strength-meta { width: 100%; display: flex; justify-content: space-between; margin-bottom: 20px; }
        #strength-label { font-size: 0.55rem; font-weight: 900; letter-spacing: 1px; opacity: 0.4; }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 25px 0; }
        .control-item { display: flex; flex-direction: column; gap: 8px; padding: 15px; border: 1px solid var(--border); }
        .label { font-size: 0.55rem; font-weight: 900; opacity: 0.3; color: var(--accent); }
        .stepper { display: flex; align-items: center; gap: 10px; }
        .stepper-btn { background: none; border: 1px solid var(--border); color: #fff; width: 24px; height: 24px; cursor: pointer; }
        input[type="range"] { flex: 1; accent-color: var(--accent); }
        .plate-switch { height: 40px; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .plate-switch input { display: none; }
        .plate-switch .status-text { font-size: 0.6rem; font-weight: 900; opacity: 0.5; color: #fff; }
        .plate-switch:has(input:checked) { border-color: var(--accent); }
        .plate-switch:has(input:checked) .status-text { opacity: 1; color: var(--accent); }
        
        .gen-button { width: 100%; background: #fff; color: #000; border: none; padding: 20px; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .gen-button:hover { background: var(--accent); color: #fff; letter-spacing: 4px; }
        
        .copy-trigger { width: 100%; padding: 12px; border: 1px solid var(--border); margin-bottom: 15px; cursor: pointer; text-align: center; background: transparent; color: #fff; opacity: 0; pointer-events: none; transition: 0.3s; }
        .copy-trigger.visible { opacity: 1; pointer-events: auto; }

        /* --- FOOTER SYSTEM --- */
        footer { padding: 150px 5% 50px; margin-top: 10vh; border-top: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .motto { font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 0.9; margin-bottom: 60px; color: #fff; }
        .motto span { display: block; transform: translateY(30px); opacity: 0; transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .motto.visible span { transform: translateY(0); opacity: 1; }
        .motto b { font-weight: 900; padding-left: 5%; display: block; color: var(--accent); }
        .motto i { font-style: normal; opacity: 0.2; padding-left: 10%; display: block; }
        .reveal-box { background: #111; height: 180px; width: 100%; margin: 50px 0; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); }
        .reveal-box h1 { font-size: 12vw; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.1); transition: color 0.5s; z-index: 2; pointer-events: none; }
        .reveal-box:hover h1 { color: #fff; }
        .grain { position: absolute; inset: -50%; width: 200%; height: 200%; opacity: 0; pointer-events: none; z-index: 3; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        .reveal-box:hover .grain { opacity: 0.1; animation: jitter 0.15s steps(2) infinite; }
        @keyframes jitter { 0% { transform: translate(0,0); } 50% { transform: translate(-1%, -1%); } }
        .footer-meta { display: flex; justify-content: space-between; align-items: flex-end; opacity: 0.4; font-size: 0.7rem; font-weight: 900; }

        /* LOADER & TRANSITIONS */
        #loader { position: fixed; inset: 0; background: #000; z-index: 3000000; display: flex; justify-content: center; align-items: center; animation: reveal-crooked 1.2s cubic-bezier(0.87, 0, 0.13, 1) 1.5s forwards; }
        .bar { width: 150px; height: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .fill { height: 100%; width: 0; background: #fff; animation: fill 1.5s forwards; }
        @keyframes fill { to { width: 100%; } }
        @keyframes reveal-crooked { to { transform: translateY(-110%) rotate(-5deg); visibility: hidden; } }
        #transition-curtain { position: fixed; inset: 0; background: #000; z-index: 9999999; transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1); pointer-events: none; }
        #transition-curtain.active { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="top-scroll-bar"></div>
    <div id="transition-curtain"></div>
    <div id="loader"><div class="bar"><div class="fill"></div></div></div>

    <button onclick="transitionTo('index.html')" class="exit-btn">← return</button>

    <div class="history-panel" id="history-panel">
        <button class="history-btn" onclick="toggleHistory()">history</button>
        <div class="history-content">
            <div class="history-header">
                <span class="history-label">archives</span>
                <span class="clear-history" onclick="clearArchives()">[ wipe ]</span>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <div id="smooth-wrapper">
        <div id="smooth-content">
            <section class="content-zone">
                <div class="grid-bg" id="parallax-grid"></div>
                <div class="vault-container">
                    <div class="output-box" id="output-box">
                        <div class="gen-output" id="password-display">LOCKED</div>
                    </div>
                    
                    <div class="strength-meta">
                        <span id="strength-label">status: idle</span>
                    </div>

                    <button class="copy-trigger" id="copy-btn" onclick="copyPassword()">
                        <span id="copy-text" class="status-text">copy to clipboard</span>
                    </button>

                    <div class="controls-grid">
                        <div class="control-item" style="grid-column: span 2;">
                            <span class="label" id="length-label">length: 16</span>
                            <div class="stepper">
                                <button class="stepper-btn" onclick="adjustLength(-1)">-</button>
                                <input type="range" id="length-slider" min="8" max="40" value="16">
                                <button class="stepper-btn" onclick="adjustLength(1)">+</button>
                            </div>
                        </div>
                        <label class="plate-switch"><input type="checkbox" id="symbols-toggle" checked><span class="status-text">symbols</span></label>
                        <label class="plate-switch"><input type="checkbox" id="numbers-toggle" checked><span class="status-text">numbers</span></label>
                        <label class="plate-switch"><input type="checkbox" id="upper-toggle" checked><span class="status-text">uppercase</span></label>
                        <label class="plate-switch"><input type="checkbox" id="extra-toggle"><span class="status-text">ambig</span></label>
                    </div>
                    <button class="gen-button" onclick="scrambleGenerate()">GENERATE STRING</button>
                </div>
            </section>

            <footer>
                <div class="motto" id="animated-motto">
                    <span style="transition-delay: 0.1s;">dont</span> 
                    <span style="transition-delay: 0.2s;"><b>stop</b></span> 
                    <span style="transition-delay: 0.3s;"><i>dreaming.</i></span>
                </div>
                <div class="footer-meta">
                    <div>est. 2026 / vault_sys</div>
                    <div class="copyright">© ziipzy studio</div>
                </div>
                <div class="reveal-box" id="footer-trigger">
                    <div class="grain"></div>
                    <h1 id="footer-logo">ziipzy</h1>
                </div>
            </footer>
        </div>
    </div>

    <script>
        let currentScroll = 0, targetScroll = 0, currentPass = "";
        const ease = 0.08;
        const content = document.getElementById('smooth-content');
        const progress = document.getElementById('top-scroll-bar');
        const motto = document.getElementById('animated-motto');
        const footerLogo = document.getElementById('footer-logo');
        const footerTrigger = document.getElementById('footer-trigger');
        const outputBox = document.getElementById('output-box');
        const strengthLabel = document.getElementById('strength-label');

        function lerp(s, e, t) { return s * (1 - t) + e * t; }

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX, y = e.clientY;
            const box = footerTrigger.getBoundingClientRect();
            if (x > box.left && x < box.right && y > box.top && y < box.bottom) {
                const moveX = (x - (box.left + box.width/2)) * 0.2;
                const moveY = (y - (box.top + box.height/2)) * 0.2;
                footerLogo.style.transform = `translate(${moveX}px, ${moveY}px)`;
            } else {
                footerLogo.style.transform = `translate(0, 0)`;
            }
        });

        function updateScroll() {
            document.body.style.height = content.getBoundingClientRect().height + 'px';
            targetScroll = window.scrollY;
            currentScroll = lerp(currentScroll, targetScroll, ease);
            content.style.transform = `translate3d(0, -${currentScroll}px, 0)`;
            const maxScroll = document.body.scrollHeight - window.innerHeight;
            if (maxScroll > 0) progress.style.width = (targetScroll / maxScroll) * 100 + "%";
            if (motto.getBoundingClientRect().top < window.innerHeight - 50) motto.classList.add('visible');
            requestAnimationFrame(updateScroll);
        }

        function toggleHistory() { document.getElementById('history-panel').classList.toggle('active'); }

        function adjustLength(v) {
            const s = document.getElementById('length-slider');
            s.value = parseInt(s.value) + v;
            document.getElementById('length-label').textContent = `length: ${s.value}`;
        }

        document.getElementById('length-slider').addEventListener('input', (e) => {
            document.getElementById('length-label').textContent = `length: ${e.target.value}`;
        });

        function getStrength(pass) {
            let score = 0;
            if (pass.length > 12) score++;
            if (pass.length > 20) score++;
            if (/[A-Z]/.test(pass)) score++;
            if (/[0-9]/.test(pass)) score++;
            if (/[^A-Za-z0-9]/.test(pass)) score++;
            
            if (score < 3) return { label: 'weak', color: '#441111' };
            if (score < 5) return { label: 'moderate', color: '#443311' };
            return { label: 'secure', color: '#114422' };
        }

        function scrambleGenerate() {
            const length = document.getElementById('length-slider').value;
            let charset = "abcdefghijkmnopqrstuvwxyz";
            if (document.getElementById('upper-toggle').checked) charset += "ABCDEFGHJKLMNPQRSTUVWXYZ";
            if (document.getElementById('numbers-toggle').checked) charset += "23456789";
            if (document.getElementById('symbols-toggle').checked) charset += "!@#$%^&*()_+";
            
            let res = "";
            for (let i = 0; i < length; i++) res += charset.charAt(Math.floor(Math.random() * charset.length));
            currentPass = res;

            const strength = getStrength(res);
            strengthLabel.textContent = "status: encrypting...";
            outputBox.style.background = "#000";

            let i = 0;
            const pool = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            const interval = setInterval(() => {
                document.getElementById('password-display').innerText = res.split('').map((c, idx) => idx < i ? res[idx] : pool.charAt(Math.floor(Math.random() * pool.length))).join('');
                if(i >= res.length) {
                    clearInterval(interval);
                    strengthLabel.textContent = `status: ${strength.label}`;
                    outputBox.style.background = strength.color;
                    document.getElementById('copy-btn').classList.add('visible');
                    saveToArchives(res);
                }
                i++;
            }, 30);
        }

        function saveToArchives(str) {
            let archives = JSON.parse(localStorage.getItem('ziipzy_vault')) || [];
            const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            archives.unshift({str, timestamp});
            if(archives.length > 10) archives.pop();
            localStorage.setItem('ziipzy_vault', JSON.stringify(archives));
            renderArchives();
        }

        function renderArchives() {
            const list = document.getElementById('history-list');
            let archives = JSON.parse(localStorage.getItem('ziipzy_vault')) || [];
            list.innerHTML = archives.map(item => `
                <div class="history-item" onclick="copyPassword('${item.str}')">
                    <span class="history-string">${item.str}</span>
                </div>
            `).join('');
        }

        function copyPassword(text = currentPass) {
            navigator.clipboard.writeText(text);
            const txt = document.getElementById('copy-text');
            txt.textContent = "✓ [ secured ]";
            setTimeout(() => { txt.textContent = "copy to clipboard"; }, 2000);
        }

        function clearArchives() { localStorage.removeItem('ziipzy_vault'); renderArchives(); }
        function transitionTo(url) { 
            document.getElementById('transition-curtain').classList.add('active');
            setTimeout(() => { window.location.href = url; }, 800);
        }

        window.addEventListener('load', () => { renderArchives(); updateScroll(); });
    </script>
</body>
</html>
