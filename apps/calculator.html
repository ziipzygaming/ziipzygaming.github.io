<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ziipzy — workstation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; text-transform: lowercase; }
        :root { --bg: #080808; --card-bg: #111; --text: #ffffff; --accent: #ff3e00; --border: rgba(255,255,255,0.08); }

        .ziipzy-text, h1, h2, .ui-btn, .copyright, .exit-btn, .calc-screen, .key, .history-header, .history-item, .history-btn { 
            text-transform: uppercase !important; 
        }

        html, body { 
            overflow-x: hidden;
            background: var(--bg);
            scrollbar-width: none; 
            color: var(--text);
        }
        body::-webkit-scrollbar { display: none; }
        body { font-family: 'Inter', sans-serif; line-height: 1.1; }

        /* --- UI ELEMENTS --- */
        #top-scroll-bar { position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: var(--accent); z-index: 1000000; }
        #smooth-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; overflow: hidden; }
        #smooth-content { width: 100%; will-change: transform; display: flex; flex-direction: column; }

        .grid-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
            -webkit-mask-image: radial-gradient(circle, black, transparent 80%);
            mask-image: radial-gradient(circle, black, transparent 80%);
        }

        .exit-btn { 
            position: fixed; top: 30px; left: 30px; z-index: 1000;
            background: #fff; color: #000; padding: 12px 20px; 
            font-size: 0.6rem; font-weight: 900; letter-spacing: 0.2em; text-decoration: none;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; border: none;
        }
        .exit-btn:hover { background: var(--accent); color: #fff; transform: translateX(10px); }

        /* --- VAULT-STYLE SLIDING HISTORY PANEL --- */
        .history-panel {
            position: fixed; right: -320px; top: 50%; transform: translateY(-50%);
            z-index: 2000; display: flex; align-items: center;
            transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .history-panel.active { right: 0; }

        .history-btn {
            background: #fff; color: #000; padding: 25px 10px;
            writing-mode: vertical-rl; font-size: 0.6rem; font-weight: 900;
            letter-spacing: 0.2em; cursor: pointer; border: none; transition: 0.3s;
        }
        .history-btn:hover { background: var(--accent); color: #fff; }

        .history-content {
            width: 320px; height: 450px; background: #111; border: 1px solid var(--border);
            border-right: 4px solid var(--accent); padding: 30px; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .history-header { font-size: 0.6rem; font-weight: 900; opacity: 0.3; letter-spacing: 4px; margin-bottom: 20px; }
        .history-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; scrollbar-width: none; flex-grow: 1; }
        
        .history-item { 
            background: #000; padding: 12px; border: 1px solid var(--border);
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 4px;
        }
        .history-item:hover { border-color: var(--accent); background: #151515; }
        
        .history-exp { font-size: 0.55rem; opacity: 0.4; font-weight: 900; }
        .history-res { font-size: 0.9rem; font-weight: 900; color: var(--accent); }

        .clear-history { font-size: 0.5rem; opacity: 0.2; cursor: pointer; margin-top: 15px; font-weight: 900; }
        .clear-history:hover { opacity: 1; color: var(--accent); }

        /* --- CALCULATOR AREA --- */
        .content-zone { padding: 160px 10% 120px; text-align: center; position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .calc-wrapper {
            width: 100%; max-width: 400px; background: var(--card-bg); padding: 30px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            position: relative; z-index: 1;
        }
        
        .screen-container { background: #000; padding: 25px; margin-bottom: 25px; text-align: right; }
        .equation-preview {
            display: block; font-size: 0.8rem; color: rgba(255,255,255,0.2); min-height: 1.2rem;
            margin-bottom: 8px; font-weight: 900; letter-spacing: 0.1em;
        }
        .main-line {
            width: 100%; background: transparent; border: none; color: #fff; font-family: 'Inter', sans-serif;
            font-size: 2.2rem; font-weight: 900; text-align: right; 
            outline: none; letter-spacing: -0.05em;
        }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .key {
            padding: 18px 0; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6); font-weight: 900; font-size: 0.7rem; cursor: pointer; transition: 0.2s;
        }
        .key:hover { background: #fff; color: #000; }
        .key.accent { color: var(--accent); }
        .key.wide { grid-column: span 2; }
        .key.action { background: var(--accent); color: #fff; border: none; }
        .key.action:hover { background: #fff; color: #000; }

        .scientific-row {
            grid-column: span 4; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            margin-bottom: 10px; opacity: 0.4; transition: 0.3s;
        }
        .scientific-row:hover { opacity: 1; }
        .storage-indicator { position: absolute; top: -25px; right: 0; font-size: 0.5rem; font-weight: 900; opacity: 0.3; letter-spacing: 2px; }

        /* --- FOOTER --- */
        footer { padding: 150px 5% 50px; margin-top: 10vh; border-top: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        footer * { text-transform: lowercase !important; }
        .motto { font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 0.9; margin-bottom: 60px; color: #fff; }
        .motto span { display: block; transform: translateY(30px); opacity: 0; transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .motto.visible span { transform: translateY(0); opacity: 1; }
        .motto b { font-weight: 900; padding-left: 5%; display: block; color: var(--accent); }
        .motto i { font-style: normal; opacity: 0.2; padding-left: 10%; display: block; }

        .reveal-box { background: #111; height: 180px; width: 100%; margin: 50px 0; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); }
        .reveal-box h1 { font-size: 12vw; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.1); transition: color 0.5s; z-index: 2; pointer-events: none; }
        .reveal-box:hover h1 { color: #fff; }
        .grain { position: absolute; inset: -50%; width: 200%; height: 200%; opacity: 0; pointer-events: none; z-index: 3; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        .reveal-box:hover .grain { opacity: 0.1; animation: jitter 0.15s steps(2) infinite; }
        @keyframes jitter { 0% { transform: translate(0,0); } 50% { transform: translate(-1%, -1%); } }
        .footer-meta { display: flex; justify-content: space-between; align-items: flex-end; opacity: 0.4; font-size: 0.7rem; font-weight: 900; }

        #transition-curtain { position: fixed; inset: 0; background: #000; z-index: 9999999; transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1); pointer-events: none; }
        #transition-curtain.active { transform: translateY(0); }
        #loader { position: fixed; inset: 0; background: #000; z-index: 3000000; display: flex; justify-content: center; align-items: center; animation: reveal-crooked 1.2s cubic-bezier(0.87, 0, 0.13, 1) 1s forwards; }
        .bar { width: 150px; height: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .fill { height: 100%; width: 0; background: #fff; animation: fill 1s forwards; }
        @keyframes fill { to { width: 100%; } }
        @keyframes reveal-crooked { to { transform: translateY(-110%) rotate(-5deg); visibility: hidden; } }
    </style>
</head>
<body>

    <div id="top-scroll-bar"></div>
    <div id="transition-curtain"></div>
    <div id="loader"><div class="bar"><div class="fill"></div></div></div>

    <button onclick="transitionTo('index.html')" class="exit-btn">← return</button>

    <div class="history-panel" id="history-panel">
        <button class="history-btn" onclick="toggleHistory()">history</button>
        <div class="history-content">
            <span class="history-header">tape_history</span>
            <div class="history-list" id="history-list"></div>
            <div class="clear-history" onclick="clearHistory()">[ wipe session ]</div>
        </div>
    </div>

    <div id="smooth-wrapper">
        <div id="smooth-content">
            <section class="content-zone">
                <div class="grid-bg" id="parallax-grid"></div>
                <div class="calc-wrapper">
                    <div class="storage-indicator">sync: local_disk</div>
                    <div class="screen-container">
                        <span class="equation-preview" id="top-line"></span>
                        <input type="text" class="main-line" id="main-line" value="0" readonly>
                    </div>
                    <div class="calc-grid">
                        <div class="scientific-row">
                            <button class="key" onclick="press('Math.sin(')">sin</button>
                            <button class="key" onclick="press('Math.cos(')">cos</button>
                            <button class="key" onclick="press('Math.sqrt(')">√</button>
                            <button class="key" onclick="press('Math.PI')">π</button>
                        </div>
                        <button class="key accent" onclick="clearDisplay()">ac</button>
                        <button class="key accent" onclick="backspace()">del</button>
                        <button class="key" onclick="press('%')">%</button>
                        <button class="key accent" onclick="press('/')">÷</button>
                        <button class="key" onclick="press('7')">7</button>
                        <button class="key" onclick="press('8')">8</button>
                        <button class="key" onclick="press('9')">9</button>
                        <button class="key accent" onclick="press('*')">×</button>
                        <button class="key" onclick="press('4')">4</button>
                        <button class="key" onclick="press('5')">5</button>
                        <button class="key" onclick="press('6')">6</button>
                        <button class="key accent" onclick="press('-')">−</button>
                        <button class="key" onclick="press('1')">1</button>
                        <button class="key" onclick="press('2')">2</button>
                        <button class="key" onclick="press('3')">3</button>
                        <button class="key accent" onclick="press('+')">+</button>
                        <button class="key wide" onclick="press('0')">0</button>
                        <button class="key" onclick="press('.')">.</button>
                        <button class="key action" onclick="calculate()">=</button>
                    </div>
                </div>
            </section>

            <footer>
                <div class="motto" id="animated-motto">
                    <span style="transition-delay: 0.1s;">dont</span> 
                    <span style="transition-delay: 0.2s;"><b>stop</b></span> 
                    <span style="transition-delay: 0.3s;"><i>dreaming.</i></span>
                </div>
                <div class="footer-meta">
                    <div>est. 2026 / workstation_module</div>
                    <div class="copyright">© ziipzy studio</div>
                </div>
                <div class="reveal-box" id="footer-trigger">
                    <div class="grain"></div>
                    <h1 id="footer-logo">ziipzy</h1>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const mainLine = document.getElementById('main-line');
        const topLine = document.getElementById('top-line');
        let currentInput = "0";
        let history = JSON.parse(localStorage.getItem('ziipzy_history')) || [];

        window.addEventListener('DOMContentLoaded', () => {
            renderHistory();
            window.addEventListener('keydown', (e) => {
                if (e.key >= '0' && e.key <= '9') press(e.key);
                else if (e.key === '.') press('.');
                else if (e.key === '+') press('+');
                else if (e.key === '-') press('-');
                else if (e.key === '*') press('*');
                else if (e.key === '/') { e.preventDefault(); press('/'); }
                else if (e.key === 'Enter') { e.preventDefault(); calculate(); }
                else if (e.key === 'Backspace') backspace();
                else if (e.key === 'Escape') clearDisplay();
            });
        });

        function press(val) {
            if (currentInput === "0" && val !== ".") currentInput = val;
            else currentInput += val;
            mainLine.value = currentInput;
        }

        function clearDisplay() { 
            currentInput = "0"; 
            mainLine.value = "0";
            topLine.textContent = "";
        }

        function backspace() {
            currentInput = currentInput.slice(0, -1);
            if (currentInput === "") currentInput = "0";
            mainLine.value = currentInput;
        }

        function calculate() {
            if (currentInput === "0") return;
            try {
                let expression = currentInput.replace(/÷/g, '/').replace(/×/g, '*');
                let result = eval(expression);
                let finalResult = Number.isInteger(result) ? result.toString() : result.toFixed(4);
                
                topLine.textContent = currentInput + " =";
                mainLine.value = finalResult;

                history.unshift({ exp: currentInput, res: finalResult });
                if (history.length > 20) history.pop();
                localStorage.setItem('ziipzy_history', JSON.stringify(history));
                
                currentInput = finalResult;
                renderHistory();
            } catch (e) { mainLine.value = "ERROR"; currentInput = "0"; }
        }

        function toggleHistory() { document.getElementById('history-panel').classList.toggle('active'); }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="loadHistory(${index})">
                    <span class="history-exp">${item.exp}</span>
                    <span class="history-res">${item.res}</span>
                </div>
            `).join('');
        }

        function loadHistory(index) {
            currentInput = history[index].res;
            mainLine.value = currentInput;
            topLine.textContent = history[index].exp + " =";
            toggleHistory();
        }

        function clearHistory() {
            history = [];
            localStorage.removeItem('ziipzy_history');
            renderHistory();
        }

        let currentScroll = 0, targetScroll = 0;
        const content = document.getElementById('smooth-content');
        const motto = document.getElementById('animated-motto');
        function updateScroll() {
            if (content) {
                document.body.style.height = content.getBoundingClientRect().height + 'px';
                targetScroll = window.scrollY;
                currentScroll = currentScroll * 0.9 + targetScroll * 0.1;
                content.style.transform = `translate3d(0, -${currentScroll}px, 0)`;
                if (motto.getBoundingClientRect().top < window.innerHeight - 50) motto.classList.add('visible');
            }
            requestAnimationFrame(updateScroll);
        }
        window.addEventListener('load', updateScroll);

        const footerLogo = document.getElementById('footer-logo');
        const footerTrigger = document.getElementById('footer-trigger');
        document.addEventListener('mousemove', (e) => {
            const box = footerTrigger.getBoundingClientRect();
            if (e.clientX > box.left && e.clientX < box.right && e.clientY > box.top && e.clientY < box.bottom) {
                footerLogo.style.transform = `translate(${(e.clientX - (box.left + box.width/2)) * 0.2}px, ${(e.clientY - (box.top + box.height/2)) * 0.2}px)`;
            } else { footerLogo.style.transform = `translate(0,0)`; }
        });

        function transitionTo(url) { document.getElementById('transition-curtain').classList.add('active'); setTimeout(() => window.location.href = url, 800); }
    </script>
</body>
</html>
