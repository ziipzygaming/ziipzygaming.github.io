<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ziipzy — focus timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; text-transform: lowercase; }
        :root { --bg: #080808; --card-bg: #111; --text: #ffffff; --accent: #ff3e00; }

        .ziipzy-text, h1, h2, .ui-btn, .copyright, .timer-display, .exit-btn, .sound-label, .preset-btn, .chip { 
            text-transform: uppercase !important; 
        }

        html, body { 
            overflow-x: hidden;
            background: var(--bg);
            scrollbar-width: none; 
            color: var(--text);
        }
        body::-webkit-scrollbar { display: none; }
        body { font-family: 'Inter', sans-serif; line-height: 1.1; }

        /* --- UI ELEMENTS --- */
        #top-scroll-bar { position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: var(--accent); z-index: 1000000; }
        #smooth-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; overflow: hidden; }
        #smooth-content { width: 100%; will-change: transform; display: flex; flex-direction: column; }

        .grid-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
            -webkit-mask-image: radial-gradient(circle, black, transparent 80%);
            mask-image: radial-gradient(circle, black, transparent 80%);
        }

        .exit-btn { 
            position: fixed; top: 30px; left: 30px; z-index: 1000;
            background: #fff; color: #000; padding: 12px 20px; 
            font-size: 0.6rem; font-weight: 900; letter-spacing: 0.2em; text-decoration: none;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; border: none;
        }
        .exit-btn:hover { background: var(--accent); color: #fff; transform: translateX(10px); }

        #transition-curtain {
            position: fixed; inset: 0; background: #000; z-index: 9999999;
            transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
            pointer-events: none;
        }
        #transition-curtain.active { transform: translateY(0); }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 3000000;
            display: flex; justify-content: center; align-items: center;
            transform-origin: top left;
            animation: reveal-crooked 1.2s cubic-bezier(0.87, 0, 0.13, 1) 1s forwards;
            pointer-events: none;
        }
        .bar { width: 150px; height: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .fill { height: 100%; width: 0; background: #fff; animation: fill 1s forwards; }
        @keyframes fill { to { width: 100%; } }
        @keyframes reveal-crooked { to { transform: translateY(-110%) rotate(-5deg); visibility: hidden; } }

        /* --- TIMER AREA --- */
        .content-zone { padding: 160px 10% 120px; text-align: center; position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .time-presets { display: flex; gap: 10px; margin-bottom: 20px; }
        .preset-btn { 
            background: transparent; border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 18px; font-weight: 900; font-size: 0.6rem; color: rgba(255,255,255,0.4);
            cursor: pointer; transition: 0.3s; letter-spacing: 0.1em;
        }
        .preset-btn:hover { border-color: #fff; color: #fff; }
        .preset-btn.active { background: #fff; color: #000; border-color: #fff; }

        .timer-display { 
            font-size: clamp(4rem, 18vw, 15rem); font-weight: 900; line-height: 0.8; margin: 20px 0;
            font-variant-numeric: tabular-nums; letter-spacing: -0.05em;
        }
        .timer-display.alert { color: var(--accent); animation: pulse-red 0.5s infinite alternate; }
        @keyframes pulse-red { from { opacity: 1; } to { opacity: 0.5; } }

        /* --- SOUND SELECTOR --- */
        .sound-selector { margin-bottom: 50px; }
        .sound-label { font-size: 0.6rem; letter-spacing: 0.3em; opacity: 0.2; font-weight: 900; margin-bottom: 20px; display: block; }
        .sound-chips { display: flex; gap: 12px; justify-content: center; }
        .chip { 
            padding: 10px 20px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.6rem; font-weight: 900; 
            cursor: pointer; transition: 0.3s; background: transparent; color: rgba(255,255,255,0.4);
        }
        .chip:hover { border-color: #fff; color: #fff; }
        .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .controls { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .ui-btn { 
            padding: 20px 40px; background: #fff; color: #000; border: none; 
            font-weight: 900; letter-spacing: 2px; cursor: pointer; transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); 
            text-decoration: none; font-size: 0.7rem; min-width: 160px;
        }
        .ui-btn:hover { background: var(--accent); color: #fff; transform: translateY(-5px); }
        .ui-btn.alt { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .ui-btn.alt:hover { border-color: #fff; transform: translateY(-5px); }

        .back-nav { margin-top: 80px; }
        .back-nav a { text-decoration: none; color: #fff; font-weight: 900; opacity: 0.2; transition: 0.3s; font-size: 0.6rem; letter-spacing: 3px; }
        .back-nav a:hover { opacity: 1; color: var(--accent); }

        /* --- FOOTER (MATCHED TO DIRECTORY) --- */
        footer { 
            padding: 150px 5% 50px; margin-top: 10vh;
            border-top: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; 
        }
        footer * { text-transform: lowercase !important; }
        .motto { font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 0.9; margin-bottom: 60px; color: #fff; }
        .motto span { display: block; transform: translateY(30px); opacity: 0; transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .motto.visible span { transform: translateY(0); opacity: 1; }
        .motto b { font-weight: 900; padding-left: 5%; display: block; color: var(--accent); }
        .motto i { font-style: normal; opacity: 0.2; padding-left: 10%; display: block; }

        .reveal-box { 
            background: #111; height: 180px; width: 100%; margin: 50px 0;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.03);
        }
        .reveal-box h1 { 
            font-size: 12vw; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.1); 
            transition: color 0.5s, transform 0.1s ease-out; z-index: 2; pointer-events: none;
            text-transform: lowercase !important;
        }
        .reveal-box:hover h1 { color: #fff; }
        .grain { 
            position: absolute; inset: -50%; width: 200%; height: 200%; opacity: 0; pointer-events: none; z-index: 3; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); 
        }
        .reveal-box:hover .grain { opacity: 0.1; animation: jitter 0.15s steps(2) infinite; }
        @keyframes jitter { 0% { transform: translate(0,0); } 50% { transform: translate(-1%, -1%); } }

        .footer-meta { display: flex; justify-content: space-between; align-items: flex-end; opacity: 0.4; font-size: 0.7rem; font-weight: 900; }

        @media (max-width: 768px) { .exit-btn { top: 20px; left: 20px; } .reveal-box { height: 100px; } }
    </style>
</head>
<body>

    <div id="top-scroll-bar"></div>
    <div id="transition-curtain"></div>
    <div id="loader"><div class="bar"><div class="fill"></div></div></div>

    <button onclick="transitionTo('index.html')" class="exit-btn">← return</button>

    <div id="smooth-wrapper">
        <div id="smooth-content">
            <section class="content-zone">
                <div class="grid-bg" id="parallax-grid"></div>
                
                <div class="time-presets">
                    <button class="preset-btn" data-time="300" onclick="setPreset(300)">5m</button>
                    <button class="preset-btn" data-time="900" onclick="setPreset(900)">15m</button>
                    <button class="preset-btn active" data-time="1500" onclick="setPreset(1500)">25m</button>
                    <button class="preset-btn" data-time="3600" onclick="setPreset(3600)">60m</button>
                </div>

                <div class="timer-display" id="time-display">25:00</div>

                <div class="sound-selector">
                    <span class="sound-label">Alarm Profile</span>
                    <div class="sound-chips">
                        <div class="chip active" onclick="setSound('nothing')">Nothing</div>
                        <div class="chip" onclick="setSound('mechanical')">Mechanical</div>
                        <div class="chip" onclick="setSound('pulse')">Pulse</div>
                    </div>
                </div>
                
                <div class="controls">
                    <button class="ui-btn" id="start-btn">start</button>
                    <button class="ui-btn alt" id="pause-btn">pause</button>
                    <button class="ui-btn alt" id="reset-btn">reset</button>
                </div>

                <div class="back-nav">
                    <a href="javascript:void(0)" onclick="transitionTo('index.html')">[ back to labs ]</a>
                </div>
            </section>

            <footer>
                <div class="motto" id="animated-motto">
                    <span style="transition-delay: 0.1s;">dont</span> 
                    <span style="transition-delay: 0.2s;"><b>stop</b></span> 
                    <span style="transition-delay: 0.3s;"><i>dreaming.</i></span>
                </div>
                <div class="footer-meta">
                    <div>est. 2026 / focus_module</div>
                    <div class="copyright">© ziipzy studio</div>
                </div>
                <div class="reveal-box" id="footer-trigger">
                    <div class="grain"></div>
                    <h1 id="footer-logo">ziipzy</h1>
                </div>
            </footer>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let alarmInterval = null;
        let selectedSound = 'nothing';
        const MASTER_GAIN = 0.8; 

        const sounds = {
            nothing: (t) => {
                [0, 0.1, 0.2].forEach(delay => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(880, t + delay);
                    osc.frequency.exponentialRampToValueAtTime(1760, t + delay + 0.05);
                    gain.gain.setValueAtTime(MASTER_GAIN, t + delay);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + delay + 0.1);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(t + delay); osc.stop(t + delay + 0.1);
                });
            },
            mechanical: (t) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, t);
                osc.frequency.linearRampToValueAtTime(55, t + 0.2);
                gain.gain.setValueAtTime(MASTER_GAIN, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t); osc.stop(t + 0.25);
            },
            pulse: (t) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(2000, t);
                gain.gain.setValueAtTime(MASTER_GAIN, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t); osc.stop(t + 0.5);
            }
        };

        function setSound(name) {
            selectedSound = name;
            document.querySelectorAll('.chip').forEach(c => {
                c.classList.remove('active');
                if(c.textContent.toLowerCase() === name) c.classList.add('active');
            });
            if (audioCtx.state === 'suspended') audioCtx.resume();
            sounds[name](audioCtx.currentTime);
        }

        // --- TIMER LOGIC ---
        let baseTime = 1500;
        let timeLeft = 1500;
        let timerId = null;
        let isRunning = false;

        const timeDisplay = document.getElementById('time-display');
        const startBtn = document.getElementById('start-btn');

        function updateTimerUI() {
            if (timeLeft <= 0) {
                timeDisplay.textContent = "DONE";
                timeDisplay.classList.add('alert');
                document.title = "!!! DONE !!!";
            } else {
                timeDisplay.classList.remove('alert');
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                const timeString = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                timeDisplay.textContent = timeString;
                document.title = isRunning ? `(${timeString}) ziipzy` : `ziipzy — focus timer`;
            }
        }

        function setPreset(seconds) {
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('active');
                if(parseInt(btn.getAttribute('data-time')) === seconds) btn.classList.add('active');
            });
            baseTime = seconds;
            resetTimer();
        }

        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!isRunning && timeLeft > 0) {
                isRunning = true;
                startBtn.textContent = 'running';
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerUI();
                    }
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        timerId = null;
                        sounds[selectedSound](audioCtx.currentTime);
                        alarmInterval = setInterval(() => sounds[selectedSound](audioCtx.currentTime), 1000);
                        updateTimerUI();
                    }
                }, 1000);
            }
        });

        function stopAllAudio() {
            clearInterval(timerId);
            clearInterval(alarmInterval);
            timerId = null;
            alarmInterval = null;
        }

        document.getElementById('pause-btn').addEventListener('click', () => {
            stopAllAudio();
            isRunning = false;
            startBtn.textContent = 'start';
            updateTimerUI();
        });

        function resetTimer() {
            stopAllAudio();
            isRunning = false;
            timeLeft = baseTime;
            startBtn.textContent = 'start';
            updateTimerUI();
        }

        document.getElementById('reset-btn').addEventListener('click', resetTimer);

        // --- SCROLL & PARALLAX ENGINE ---
        let currentScroll = 0, targetScroll = 0;
        const content = document.getElementById('smooth-content');
        const progress = document.getElementById('top-scroll-bar');
        const grid = document.getElementById('parallax-grid');
        const motto = document.getElementById('animated-motto');
        const footerLogo = document.getElementById('footer-logo');
        const footerTrigger = document.getElementById('footer-trigger');

        // Mouse Parallax for footer
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const box = footerTrigger.getBoundingClientRect();
            if (x > box.left && x < box.right && y > box.top && y < box.bottom) {
                const moveX = (x - (box.left + box.width/2)) * 0.2;
                const moveY = (y - (box.top + box.height/2)) * 0.2;
                footerLogo.style.transform = `translate(${moveX}px, ${moveY}px)`;
            } else {
                footerLogo.style.transform = `translate(0, 0)`;
            }
        });

        function updateScroll() {
            if (document.visibilityState === 'visible' && content) {
                document.body.style.height = content.getBoundingClientRect().height + 'px';
                targetScroll = window.scrollY;
                currentScroll = currentScroll * 0.9 + targetScroll * 0.1;
                content.style.transform = `translate3d(0, -${currentScroll}px, 0)`;
                
                const max = document.body.scrollHeight - window.innerHeight;
                if (max > 0) progress.style.width = (targetScroll / max) * 100 + "%";
                if (grid) grid.style.transform = `translate3d(0, ${currentScroll * 0.2}px, 0)`;
                
                const mottoPos = motto.getBoundingClientRect().top;
                if (mottoPos < window.innerHeight - 50) motto.classList.add('visible');
            }
            requestAnimationFrame(updateScroll);
        }

        window.addEventListener('load', () => { updateScroll(); updateTimerUI(); });
        function transitionTo(url) { document.getElementById('transition-curtain').classList.add('active'); setTimeout(() => { window.location.href = url; }, 800); }
    </script>
</body>
</html>
