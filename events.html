<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ziipzy — events</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* --- CORE SYSTEM --- */
        * { box-sizing: border-box; margin: 0; padding: 0; text-transform: lowercase; }
        :root { --bg: #080808; --card-bg: #111; --text: #ffffff; --accent: #ff3e00; }

        .ziipzy-text, h1, .tab-btn, .exit-btn, .copyright, .reveal-box h1, .timer, .info, .tz-label, #utc-clock, .format-toggle-btn, .motto b { text-transform: lowercase !important; }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; overflow-x: hidden;
            line-height: 1.1; scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        /* --- TRANSITIONS --- */
        #transition-curtain {
            position: fixed; inset: 0; background: #000; z-index: 9999999;
            transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
            pointer-events: none;
        }
        #transition-curtain.active { transform: translateY(0); }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 3000000;
            display: flex; justify-content: center; align-items: center;
            transform-origin: top left;
            animation: reveal-crooked 1.2s cubic-bezier(0.87, 0, 0.13, 1) 2s forwards;
            pointer-events: none;
        }
        .bar { width: 150px; height: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .fill { height: 100%; width: 0; background: #fff; animation: fill 2s forwards; }
        @keyframes fill { to { width: 100%; } }
        @keyframes reveal-crooked { to { transform: translateY(-110%) rotate(-5deg); visibility: hidden; } }

        /* --- SMOOTH SCROLL --- */
        #smooth-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; overflow: hidden; }
        #smooth-content { width: 100%; will-change: transform; display: flex; flex-direction: column; }

        /* --- UI ELEMENTS --- */
        #top-scroll-bar { position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: var(--accent); z-index: 1000000; }

        .exit-btn { 
            position: fixed; top: 30px; left: 30px; z-index: 1000;
            background: #fff; color: #000; padding: 12px 20px; 
            font-size: 0.6rem; font-weight: 900; letter-spacing: 0.2em; border: none;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer;
        }
        .exit-btn:hover { background: var(--accent); color: #fff; transform: translateX(10px); }

        /* --- HEADER & CLOCKS --- */
        header { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 100px 10%; position: relative; }
        #local-clock { font-size: clamp(3.5rem, 15vw, 10rem); font-weight: 900; letter-spacing: -0.05em; line-height: 0.8; margin: 20px 0; }
        .tz-label { font-size: 0.7rem; letter-spacing: 0.5em; opacity: 0.3; font-weight: 900; }
        #utc-clock { font-family: monospace; font-size: 1.1rem; font-weight: 900; opacity: 0.2; letter-spacing: 0.2em; }

        .format-toggle-btn {
            margin-top: 40px; background: transparent; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px; font-size: 0.6rem; font-weight: 900; letter-spacing: 0.2em;
            cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.4);
        }
        .format-toggle-btn:hover { border-color: #fff; color: #fff; }

        /* --- TABS --- */
        .controls-container { 
            background: rgba(8,8,8,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tab-btn { background: none; border: none; color: rgba(255,255,255,0.3); padding: 25px; font-weight: 900; font-size: 0.7rem; letter-spacing: 0.2em; cursor: pointer; transition: 0.4s; }
        .tab-btn.active { color: #fff; box-shadow: inset 0 -4px 0 var(--accent); }

        /* --- GRID & CARDS --- */
        .tab-content { display: none; padding: 80px 10%; min-height: 60vh; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .card { 
            background: var(--card-bg); padding: 40px; border-left: 4px solid var(--accent); 
            position: relative; opacity: 0; transform: translateY(30px);
            transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { background: #161616; }

        .card h3 { font-weight: 900; font-size: 1.8rem; margin-bottom: 10px; line-height: 1; letter-spacing: -0.02em; }
        .card .info { font-size: 0.6rem; letter-spacing: 0.15em; opacity: 0.3; display: block; margin-bottom: 25px; font-weight: 900; }
        
        .timer { font-family: monospace; font-size: 1.1rem; font-weight: 900; background: #000; color: #fff; padding: 15px; text-align: center; letter-spacing: 0.1em; border: 1px solid rgba(255,255,255,0.05); }
        .timer.imminent { border-color: var(--accent); color: var(--accent); }

        .f-tag { position: absolute; bottom: 20px; right: 20px; font-weight: 900; font-size: 3rem; opacity: 0.03; pointer-events: none; }

        /* --- FOOTER (MATCHED TO DIRECTORY) --- */
        footer { 
            padding: 150px 5% 50px; margin-top: 10vh;
            border-top: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; 
        }
        .motto { font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 0.9; margin-bottom: 60px; color: #fff; }
        .motto span { display: block; transform: translateY(30px); opacity: 0; transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .motto.visible span { transform: translateY(0); opacity: 1; }
        .motto b { font-weight: 900; padding-left: 5%; display: block; color: var(--accent); }
        .motto i { font-style: normal; opacity: 0.2; padding-left: 10%; display: block; }

        .reveal-box { 
            background: #111; height: 180px; width: 100%; margin: 50px 0;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.03);
        }
        .reveal-box h1 { 
            font-size: 12vw; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.1); 
            transition: color 0.5s, transform 0.1s ease-out; z-index: 2; pointer-events: none;
        }
        .reveal-box:hover h1 { color: #fff; }
        .grain { 
            position: absolute; inset: -50%; width: 200%; height: 200%; opacity: 0; pointer-events: none; z-index: 3; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); 
        }
        .reveal-box:hover .grain { opacity: 0.1; animation: jitter 0.15s steps(2) infinite; }
        @keyframes jitter { 0% { transform: translate(0,0); } 50% { transform: translate(-1%, -1%); } }

        .footer-meta { display: flex; justify-content: space-between; align-items: flex-end; opacity: 0.4; font-size: 0.7rem; font-weight: 900; }
        @media (max-width: 768px) { .reveal-box { height: 100px; } }
    </style>
</head>
<body>

    <div id="top-scroll-bar"></div>
    <div id="transition-curtain"></div>
    <div id="loader"><div class="bar"><div class="fill"></div></div></div>

    <div id="smooth-wrapper">
        <div id="smooth-content">
            <button onclick="transitionTo('index.html')" class="exit-btn">← return</button>

            <header>
                <div class="tz-label">system time / <span id="tz-name">...</span></div>
                <div id="local-clock">00:00:00</div>
                <div id="utc-clock">UTC 00:00:00</div>
                <button class="format-toggle-btn" id="format-toggle" onclick="toggleTimeFormat()">format: 24h</button>
            </header>

            <div class="controls-container">
                <button class="tab-btn active" onclick="openTab(event, 'global-tab', '#ff3e00')">Global</button>
                <button class="tab-btn" onclick="openTab(event, 'f1-tab', '#ff0000')">Formula 1</button>
                <button class="tab-btn" onclick="openTab(event, 'endurance-tab', '#0044ff')">Endurance</button>
            </div>

            <main>
                <div id="global-tab" class="tab-content active"><div class="grid" id="global-grid"></div></div>
                <div id="f1-tab" class="tab-content"><div class="grid" id="f1-grid"></div></div>
                <div id="endurance-tab" class="tab-content"><div class="grid" id="endurance-grid"></div></div>
            </main>

            <footer>
                <div class="motto" id="animated-motto">
                    <span style="transition-delay: 0.1s;">dont</span> 
                    <span style="transition-delay: 0.2s;"><b>stop</b></span> 
                    <span style="transition-delay: 0.3s;"><i>dreaming.</i></span>
                </div>
                <div class="footer-meta">
                    <div>est. 2026 / events_module</div>
                    <div class="copyright">© ziipzy studio</div>
                </div>
                <div class="reveal-box" id="footer-trigger">
                    <div class="grain"></div>
                    <h1 id="footer-logo">ziipzy</h1>
                </div>
            </footer>
        </div>
    </div>

    <script>
        // ... [Keep your event data arrays here unchanged] ...
        const globalEvents = [
            { name: "Winter Olympics", loc: "Milano Cortina", date: "Feb 06, 2026 00:00:00", color: "#0081C8" },
            { name: "The Oscars", loc: "Los Angeles", date: "Mar 15, 2026 17:00:00", color: "#D4AF37" },
            { name: "Eurovision Final", loc: "Vienna", date: "May 16, 2026 21:00:00", color: "#6A0DAD" },
            { name: "FIFA World Cup Opener", loc: "Mexico City", date: "Jun 11, 2026 12:00:00", color: "#009688" },
            { name: "USA 250th Anniv.", loc: "Philadelphia", date: "Jul 04, 2026 00:00:00", color: "#B22234" },
            { name: "World Cup Final", loc: "New York NJ", date: "Jul 19, 2026 15:00:00", color: "#009688" },
            { name: "Asian Games", loc: "Nagoya", date: "Sep 19, 2026 09:00:00", color: "#EE1C25" },
            { name: "US Elections", loc: "Washington DC", date: "Nov 03, 2026 07:00:00", color: "#002868" }
        ];

        const f1Data = [
            { n: "01", name: "Australian GP", loc: "Melbourne", date: "Mar 08, 2026 15:00:00", color: "#ff0000" },
            { n: "02", name: "Chinese GP", loc: "Shanghai", date: "Mar 15, 2026 15:00:00", color: "#ff0000" },
            { n: "03", name: "Japanese GP", loc: "Suzuka", date: "Mar 29, 2026 14:00:00", color: "#ff0000" },
            { n: "04", name: "Bahrain GP", loc: "Sakhir", date: "Apr 12, 2026 18:00:00", color: "#ff0000" },
            { n: "05", name: "Saudi Arabian GP", loc: "Jeddah", date: "Apr 19, 2026 20:00:00", color: "#ff0000" },
            { n: "06", name: "Miami GP", loc: "Miami", date: "May 03, 2026 15:30:00", color: "#ff0000" },
            { n: "07", name: "Emilia Romagna GP", loc: "Imola", date: "May 17, 2026 15:00:00", color: "#ff0000" },
            { n: "08", name: "Monaco GP", loc: "Monte Carlo", date: "May 24, 2026 15:00:00", color: "#ff0000" },
            { n: "09", name: "Spanish GP", loc: "Barcelona", date: "Jun 07, 2026 15:00:00", color: "#ff0000" },
            { n: "10", name: "Canadian GP", loc: "Montreal", date: "Jun 14, 2026 14:00:00", color: "#ff0000" },
            { n: "11", name: "Austrian GP", loc: "Spielberg", date: "Jun 28, 2026 15:00:00", color: "#ff0000" },
            { n: "12", name: "British GP", loc: "Silverstone", date: "Jul 05, 2026 15:00:00", color: "#ff0000" },
            { n: "13", name: "Belgian GP", loc: "Spa", date: "Jul 19, 2026 15:00:00", color: "#ff0000" },
            { n: "14", name: "Hungarian GP", loc: "Budapest", date: "Jul 26, 2026 15:00:00", color: "#ff0000" },
            { n: "15", name: "Dutch GP", loc: "Zandvoort", date: "Aug 23, 2026 15:00:00", color: "#ff0000" },
            { n: "16", name: "Italian GP", loc: "Monza", date: "Sep 06, 2026 15:00:00", color: "#ff0000" },
            { n: "17", name: "Azerbaijan GP", loc: "Baku", date: "Sep 20, 2026 15:00:00", color: "#ff0000" },
            { n: "18", name: "Singapore GP", loc: "Marina Bay", date: "Oct 04, 2026 20:00:00", color: "#ff0000" },
            { n: "19", name: "United States GP", loc: "Austin", date: "Oct 18, 2026 14:00:00", color: "#ff0000" },
            { n: "20", name: "Mexico City GP", loc: "Mexico City", date: "Oct 25, 2026 14:00:00", color: "#ff0000" },
            { n: "21", name: "Sao Paulo GP", loc: "Interlagos", date: "Nov 08, 2026 14:00:00", color: "#ff0000" },
            { n: "22", name: "Las Vegas GP", loc: "Las Vegas Strip", date: "Nov 21, 2026 22:00:00", color: "#ff0000" },
            { n: "23", name: "Qatar GP", loc: "Lusail", date: "Nov 29, 2026 19:00:00", color: "#ff0000" },
            { n: "24", name: "Abu Dhabi GP", loc: "Yas Marina", date: "Dec 06, 2026 17:00:00", color: "#ff0000" }
        ];

        const enduranceData = [
            { name: "24 Hours of Le Mans", loc: "Le Mans", date: "Jun 13, 2026 16:00:00", color: "#0044ff", tag: "WEC" }
        ];

        let currentScroll = 0, targetScroll = 0;
        const ease = 0.08; 
        const content = document.getElementById('smooth-content');
        const progress = document.getElementById('top-scroll-bar');
        const motto = document.getElementById('animated-motto');
        const footerLogo = document.getElementById('footer-logo');
        const footerTrigger = document.getElementById('footer-trigger');
        let is24Hour = localStorage.getItem('timeFormat') !== '12h';

        // --- MOUSE PARALLAX (DIRECTORY MATCH) ---
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const box = footerTrigger.getBoundingClientRect();
            if (x > box.left && x < box.right && y > box.top && y < box.bottom) {
                const moveX = (x - (box.left + box.width/2)) * 0.2;
                const moveY = (y - (box.top + box.height/2)) * 0.2;
                footerLogo.style.transform = `translate(${moveX}px, ${moveY}px)`;
            } else {
                footerLogo.style.transform = `translate(0, 0)`;
            }
        });

        function toggleTimeFormat() {
            is24Hour = !is24Hour;
            localStorage.setItem('timeFormat', is24Hour ? '24h' : '12h');
            document.getElementById('format-toggle').innerText = is24Hour ? 'format: 24h' : 'format: am/pm';
            updateClocks();
        }

        function lerp(start, end, t) { return start * (1 - t) + end * t; }

        function updateScroll() {
            targetScroll = window.scrollY;
            currentScroll = lerp(currentScroll, targetScroll, ease);
            content.style.transform = `translate3d(0, -${currentScroll}px, 0)`;
            document.body.style.height = content.getBoundingClientRect().height + 'px';
            
            const maxScroll = document.body.scrollHeight - window.innerHeight;
            if (maxScroll > 0) progress.style.width = (targetScroll / maxScroll) * 100 + "%";
            
            const mottoPos = motto.getBoundingClientRect().top;
            if (mottoPos < window.innerHeight - 50) motto.classList.add('visible');
            
            requestAnimationFrame(updateScroll);
        }

        function renderGrid(data, containerId, tag) {
            const grid = document.getElementById(containerId);
            data.forEach((ev, i) => {
                grid.innerHTML += `
                    <div class="card" style="border-left-color:${ev.color}">
                        <span class="f-tag">${ev.tag || tag}</span>
                        <span class="info">${ev.loc} // ${ev.n ? 'ROUND ' + ev.n : '2026'}</span>
                        <h3>${ev.name}</h3>
                        <div class="timer" id="timer-${containerId}-${i}">00:00:00:00</div>
                    </div>`;
            });
            setTimeout(() => {
                document.querySelectorAll(`#${containerId} .card`).forEach((c, idx) => {
                    setTimeout(() => c.classList.add('visible'), idx * 50);
                });
            }, 300);
        }

        function updateClocks() {
            const now = new Date();
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: !is24Hour };
            document.getElementById('local-clock').innerText = now.toLocaleTimeString('en-GB', timeOptions);
            document.getElementById('tz-name').innerText = Intl.DateTimeFormat().resolvedOptions().timeZone;
            document.getElementById('utc-clock').innerText = `UTC ${now.getUTCHours().toString().padStart(2, '0')}:${now.getUTCMinutes().toString().padStart(2, '0')}:${now.getUTCSeconds().toString().padStart(2, '0')}`;
            
            const proc = (data, pref) => data.forEach((ev, i) => {
                const diff = new Date(ev.date).getTime() - now.getTime();
                const el = document.getElementById(`timer-${pref}-${i}`);
                if (el) {
                    if (diff < 0) { el.innerText = "FINISHED"; el.style.opacity = "0.2"; }
                    else {
                        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                        el.innerText = `${d}D ${h}H ${m}M ${s}S`;
                        if (diff < 86400000) el.classList.add('imminent');
                    }
                }
            });
            proc(globalEvents, 'global-grid'); proc(f1Data, 'f1-grid'); proc(enduranceData, 'endurance-grid');
        }

        function openTab(e, id, color) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
            document.documentElement.style.setProperty('--accent', color);
            window.scrollTo(0, 0); currentScroll = 0; targetScroll = 0;
        }

        function transitionTo(url) {
            document.getElementById('transition-curtain').classList.add('active');
            setTimeout(() => { window.location.href = url; }, 800);
        }

        window.addEventListener('load', () => {
            document.getElementById('format-toggle').innerText = is24Hour ? 'format: 24h' : 'format: am/pm';
            renderGrid(globalEvents, 'global-grid', 'GLOB');
            renderGrid(f1Data, 'f1-grid', 'F1');
            renderGrid(enduranceData, 'endurance-grid', 'WEC');
            updateScroll();
            setInterval(updateClocks, 1000);
        });
    </script>
</body>
</html>
