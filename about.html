<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ziipzy — directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* --- CORE SYSTEM --- */
        * { box-sizing: border-box; margin: 0; padding: 0; text-transform: lowercase; }
        :root { --bg: #080808; --card-bg: #111; --text: #ffffff; --accent: #ff3e00; }

        .ziipzy-text, h1, .copy-btn, .back-link, .copyright, .reveal-box h1, #toast, .exit-btn, .motto b, .link-btn { text-transform: lowercase !important; }

        html, body { overflow-x: hidden; background: var(--bg); scrollbar-width: none; }
        body::-webkit-scrollbar { display: none; }
        body { font-family: 'Inter', sans-serif; color: var(--text); min-height: 100vh; line-height: 1.1; }

        /* --- ECOSYSTEM LOADER --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 3000000;
            display: flex; justify-content: center; align-items: center;
            transform-origin: top left;
            animation: reveal-crooked 1.2s cubic-bezier(0.87, 0, 0.13, 1) 1.5s forwards;
            pointer-events: none;
        }
        .bar { width: 150px; height: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .fill { height: 100%; width: 0; background: #fff; animation: fill 1.5s forwards; }
        @keyframes fill { to { width: 100%; } }
        @keyframes reveal-crooked { to { transform: translateY(-110%) rotate(-5deg); visibility: hidden; } }

        /* --- UI OVERLAYS --- */
        #top-scroll-bar { position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: var(--accent); z-index: 1000000; }
        #transition-curtain { position: fixed; inset: 0; background: #000; z-index: 9999999; transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1); pointer-events: none; }
        #transition-curtain.active { transform: translateY(0); }

        .exit-btn { 
            position: fixed; top: 30px; left: 30px; z-index: 1000;
            background: #fff; color: #000; padding: 12px 20px; 
            font-size: 0.6rem; font-weight: 900; letter-spacing: 0.2em; text-decoration: none;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; border: none;
        }
        .exit-btn:hover { background: var(--accent); color: #fff; transform: translateX(10px); }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #fff; padding: 12px 25px; font-size: 0.7rem; font-weight: 900;
            letter-spacing: 0.2em; opacity: 0; visibility: hidden; transition: 0.4s; z-index: 10005;
        }
        #toast.show { opacity: 1; visibility: visible; bottom: 50px; }

        /* --- BACKGROUND --- */
        #smooth-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; overflow: hidden; }
        #smooth-content { width: 100%; will-change: transform; display: flex; flex-direction: column; }
        
        .grid-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }
        .bg-watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 20vw; font-weight: 900; color: rgba(255, 255, 255, 0.02); 
            z-index: -1; text-transform: uppercase; white-space: nowrap; pointer-events: none;
        }

        /* --- DIRECTORY CONTENT (MODIFIED TO BUTTONS) --- */
        section { min-height: 100vh; padding: 180px 10% 100px; position: relative; }
        .dir-header h1 { font-size: clamp(3rem, 7vw, 6rem); font-weight: 900; line-height: 0.9; margin-bottom: 60px; color: #fff; letter-spacing: -0.05em; }

        .link-grid { display: grid; gap: 15px; width: 100%; }
        
        .link-btn {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 30px; border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none; color: inherit; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer; position: relative; text-align: left;
        }
        .link-btn:hover { border-color: var(--accent); background: #161616; padding-left: 40px; }
        
        .link-content { display: flex; flex-direction: column; gap: 5px; }
        .link-name { font-size: 1.5rem; font-weight: 900; color: #fff; }
        .link-label { font-size: 0.6rem; opacity: 0.3; letter-spacing: 0.2em; font-weight: 900; }

        .copy-btn {
            background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 20px; font-size: 0.6rem; font-weight: 900; letter-spacing: 0.1em; 
            opacity: 0; transition: 0.3s; cursor: pointer;
        }
        .link-btn:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: #fff; color: #000; }

        /* --- FOOTER (CODE-BY-CODE MATCH) --- */
        footer { 
            padding: 150px 5% 50px; 
            margin-top: 10vh;
            border-top: 1px solid rgba(255,255,255,0.05); 
            position: relative; overflow: hidden; 
        }

        .motto { font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 0.9; margin-bottom: 60px; }
        .motto span { display: block; transform: translateY(30px); opacity: 0; transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .motto.visible span { transform: translateY(0); opacity: 1; }
        .motto b { font-weight: 900; padding-left: 5%; display: block; color: var(--accent); }
        .motto i { font-style: normal; opacity: 0.2; padding-left: 10%; display: block; }

        .reveal-box { 
            background: #111; height: 180px; width: 100%; margin: 50px 0;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.03);
        }
        .reveal-box h1 { 
            font-size: 12vw; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.1); 
            transition: color 0.5s, transform 0.1s ease-out; z-index: 2; pointer-events: none;
        }
        .reveal-box:hover h1 { color: #fff; }
        .grain { 
            position: absolute; inset: -50%; width: 200%; height: 200%; 
            opacity: 0; pointer-events: none; z-index: 3; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); 
        }
        .reveal-box:hover .grain { opacity: 0.1; animation: jitter 0.15s steps(2) infinite; }
        @keyframes jitter { 0% { transform: translate(0,0); } 50% { transform: translate(-1%, -1%); } }

        .footer-meta { display: flex; justify-content: space-between; align-items: flex-end; opacity: 0.4; font-size: 0.7rem; font-weight: 900; }

        @media (max-width: 768px) { .reveal-box { height: 100px; } .copy-btn { opacity: 1; } .exit-btn { top: 20px; left: 20px; }}
    </style>
</head>
<body>

    <div id="top-scroll-bar"></div>
    <div id="transition-curtain"></div>
    <div id="toast">link copied.</div>
    <div id="loader"><div class="bar"><div class="fill"></div></div></div>

    <button onclick="transitionTo('index.html')" class="exit-btn">← return</button>

    <div id="smooth-wrapper">
        <div id="smooth-content">
            <div class="grid-bg" id="parallax-grid"></div>
            <div class="bg-watermark">SOCIALS</div>

            <main>
                <section>
                    <div class="dir-header"><h1>directory.</h1></div>
                    
                    <div class="link-grid">
                        <button class="link-btn" onclick="window.open('https://www.tiktok.com/@ziipzy', '_blank')">
                            <div class="link-content">
                                <span class="link-name">tiktok</span>
                                <span class="link-label">@ziipzy // social feed</span>
                            </div>
                            <span class="copy-btn" onclick="copyLink(event, 'https://www.tiktok.com/@ziipzy')">copy</span>
                        </button>

                        <button class="link-btn" onclick="window.open('https://www.youtube.com/@ziipzygaming', '_blank')">
                            <div class="link-content">
                                <span class="link-name">youtube</span>
                                <span class="link-label">ziipzy gaming // videos</span>
                            </div>
                            <span class="copy-btn" onclick="copyLink(event, 'https://www.youtube.com/@ziipzygaming')">copy</span>
                        </button>

                        <button class="link-btn" onclick="window.open('https://www.facebook.com/ziipzy', '_blank')">
                            <div class="link-content">
                                <span class="link-name">facebook</span>
                                <span class="link-label">ziipzy official</span>
                            </div>
                            <span class="copy-btn" onclick="copyLink(event, 'https://www.facebook.com/ziipzy')">copy</span>
                        </button>

                        <button class="link-btn" onclick="window.open('https://linktr.ee/ziipzygaming', '_blank')">
                            <div class="link-content">
                                <span class="link-name">linktree</span>
                                <span class="link-label">gaming hub</span>
                            </div>
                            <span class="copy-btn" onclick="copyLink(event, 'https://linktr.ee/ziipzygaming')">copy</span>
                        </button>

                        <button class="link-btn" onclick="window.open('https://docs.google.com/document/d/1Rc8XhseGJyoXKh5lqGMFQFIWeiuJ_GtDw-sDQeR39A8/', '_blank')">
                            <div class="link-content">
                                <span class="link-name">documentation</span>
                                <span class="link-label">view document</span>
                            </div>
                            <span class="copy-btn" onclick="copyLink(event, 'https://docs.google.com/document/d/1Rc8XhseGJyoXKh5lqGMFQFIWeiuJ_GtDw-sDQeR39A8/')">copy</span>
                        </button>
                    </div>
                </section>
            </main>

            <footer>
                <div class="motto" id="animated-motto">
                    <span style="transition-delay: 0.1s;">dont</span> 
                    <span style="transition-delay: 0.2s;"><b>stop</b></span> 
                    <span style="transition-delay: 0.3s;"><i>dreaming.</i></span>
                </div>

                <div class="footer-meta">
                    <div>est. 2026 / philippine core</div>
                    <div>© all rights reserved</div>
                </div>

                <div class="reveal-box" id="footer-trigger">
                    <div class="grain"></div>
                    <h1 id="footer-logo">ziipzy</h1>
                </div>
            </footer>
        </div>
    </div>

    <script>
        let currentScroll = 0, targetScroll = 0, ease = 0.08;
        const content = document.getElementById('smooth-content');
        const progress = document.getElementById('top-scroll-bar');
        const grid = document.getElementById('parallax-grid');
        const motto = document.getElementById('animated-motto');
        const footerLogo = document.getElementById('footer-logo');
        const footerTrigger = document.getElementById('footer-trigger');

        // --- MOUSE PARALLAX (EXACT MATCH) ---
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const box = footerTrigger.getBoundingClientRect();
            if (x > box.left && x < box.right && y > box.top && y < box.bottom) {
                const moveX = (x - (box.left + box.width/2)) * 0.2;
                const moveY = (y - (box.top + box.height/2)) * 0.2;
                footerLogo.style.transform = `translate(${moveX}px, ${moveY}px)`;
            } else {
                footerLogo.style.transform = `translate(0, 0)`;
            }
        });

        function lerp(start, end, t) { return start * (1 - t) + end * t; }

        function updateScroll() {
            if(content) {
                document.body.style.height = content.getBoundingClientRect().height + 'px';
                targetScroll = window.scrollY;
                currentScroll = lerp(currentScroll, targetScroll, ease);
                content.style.transform = `translate3d(0, -${currentScroll}px, 0)`;
                
                const max = document.body.scrollHeight - window.innerHeight;
                if (max > 0) progress.style.width = (targetScroll / max) * 100 + "%";
                if (grid) grid.style.transform = `translate3d(0, ${currentScroll * 0.15}px, 0)`;
                
                // Motto reveal logic
                const mottoPos = motto.getBoundingClientRect().top;
                if (mottoPos < window.innerHeight - 50) motto.classList.add('visible');
            }
            requestAnimationFrame(updateScroll);
        }

        window.addEventListener('load', () => { setTimeout(updateScroll, 100); });

        function copyLink(event, url) {
            event.stopPropagation(); 
            const showToast = () => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(url).then(showToast);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = url;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast();
                } catch (err) {
                    console.error('Fallback copy failed', err);
                }
                document.body.removeChild(textArea);
            }
        }

        function transitionTo(url) {
            document.getElementById('transition-curtain').classList.add('active');
            setTimeout(() => { window.location.href = url; }, 800);
        }
    </script>
</body>
</html>
