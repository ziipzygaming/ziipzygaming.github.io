<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socials | ZIIPZY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            /* Theme Meta */
            color-scheme: light;

            /* Palette Core */
            --bright-snow: #f8f9faff;
            --platinum: #e9ecefff;
            --alabaster-grey: #dee2e6ff;
            --pale-slate: #ced4daff;
            --pale-slate-2: #adb5bdff;
            --slate-grey: #6c757dff;
            --iron-grey: #495057ff;
            --gunmetal: #343a40ff;
            --carbon-black: #212529ff;
            
            /* Theme Variables */
            --bg-color: var(--bright-snow);
            --surface-color: var(--platinum);
            --text-main: var(--carbon-black);
            --text-sub: var(--slate-grey);
            --nav-bg: rgba(248, 249, 250, 0.85);
            --card-hover: var(--alabaster-grey);
            --accent-glow: rgba(52, 58, 64, 0.1);
            --footer-bg: var(--carbon-black);
            --footer-text: var(--bright-snow);

            /* Material 3 Tokens */
            --radius-huge: 56px;
            --radius-large: 32px;
            --radius-small: 16px;
            --easing: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-smooth: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --bg-color: var(--carbon-black);
            --surface-color: var(--gunmetal);
            --text-main: var(--bright-snow);
            --text-sub: var(--pale-slate-2);
            --nav-bg: rgba(33, 37, 41, 0.85);
            --card-hover: var(--iron-grey);
            --accent-glow: rgba(248, 249, 250, 0.08);
            --footer-bg: #111111;
            --footer-text: var(--bright-snow);
        }

        /* --- Floating Scrollbar --- */
        ::-webkit-scrollbar { width: 16px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); } 
        ::-webkit-scrollbar-thumb {
            background: var(--text-sub);
            border: 5px solid var(--bg-color); 
            background-clip: content-box;
            border-radius: 20px;
            transition: 0.3s;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-main); background-clip: content-box; }
        body:active::-webkit-scrollbar-thumb { border-width: 2px; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Google Sans', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* --- Loading Screen --- */
        #loader {
            position: fixed; inset: 0;
            background: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s var(--easing), visibility 0.8s;
        }
        .m3-spinner {
            width: 60px; height: 60px;
            border: 5px solid var(--surface-color);
            border-top-color: var(--text-main);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loaded #loader { opacity: 0; visibility: hidden; }

        .reveal { opacity: 0; transform: translateY(30px); transition: var(--transition-smooth); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- Header / Nav --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 25px 60px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: var(--nav-bg); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--accent-glow);
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 24px; letter-spacing: -1px; text-decoration: none; color: inherit; }
        .theme-btn { background: var(--text-main); color: var(--bg-color); border: none; padding: 10px 24px; border-radius: 100px; font-weight: 700; font-size: 12px; cursor: pointer; transition: var(--transition-smooth); text-transform: uppercase; }

        /* --- Hero Container (Matches Main Page Shape) --- */
        .hero-container {
            display: grid; grid-template-columns: 1.1fr 0.9fr;
            min-height: 95vh; padding: 0 10%; align-items: center;
            background: var(--surface-color);
            border-bottom-left-radius: var(--radius-huge);
            border-bottom-right-radius: var(--radius-huge);
            position: relative; overflow: hidden;
        }
        .hero-text h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(3rem, 9vw, 8rem); line-height: 0.85; margin-bottom: 25px; }

        .orb-canvas { display: flex; justify-content: center; align-items: center; height: 500px; }
        .interactive-blob {
            width: 350px; height: 350px;
            background: var(--text-main);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            cursor: pointer;
            transition: all 1s var(--easing);
            box-shadow: 0 30px 60px var(--accent-glow);
            animation: blob-morph 8s ease-in-out infinite;
        }
        @keyframes blob-morph {
            0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: translate(0, 0) rotate(0deg); }
            33% { border-radius: 50% 50% 20% 80% / 25% 80% 20% 75%; transform: translate(10px, -20px) rotate(5deg); }
            66% { border-radius: 67% 33% 47% 53% / 37% 20% 80% 63%; transform: translate(-15px, 10px) rotate(-5deg); }
        }

        /* --- Social Grid Logic --- */
        .socials-section { padding: 120px 10%; }
        .social-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 60px; }

        .social-card {
            background: var(--surface-color); padding: 40px;
            border-radius: var(--radius-large); display: flex;
            flex-direction: column; align-items: center; text-align: center;
            gap: 20px; transition: var(--transition-smooth);
            border: 1px solid transparent; text-decoration: none; color: inherit;
        }
        .social-card:hover { transform: translateY(-10px); border-color: var(--text-main); background: var(--bg-color); }

        .social-icon { font-size: 48px; color: var(--text-main); transition: 0.3s; }
        .social-card h3 { font-family: 'Space Grotesk'; font-size: 24px; letter-spacing: -0.5px; margin-top: 10px; }
        .social-handle { font-size: 14px; color: var(--text-sub); font-weight: 500; }

        /* --- Footer --- */
        footer { background: var(--footer-bg); color: var(--footer-text); padding: 80px 10%; border-top-left-radius: var(--radius-huge); border-top-right-radius: var(--radius-huge); margin-top: 100px; transition: background-color 0.5s ease; position: relative; overflow: hidden; }
        .footer-logo { font-size: 40px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; margin-bottom: 20px;}
        .footer-link { color: var(--pale-slate); text-decoration: none; margin-right: 20px; transition: 0.3s; font-size: 14px; }
        .footer-link:hover { color: white; }

        @media (max-width: 900px) {
            .hero-container { grid-template-columns: 1fr; text-align: center; padding-top: 100px; }
            nav { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="m3-spinner"></div></div>

    <nav>
        <a href="index.html" class="logo">ZIIPZY</a>
        <button class="theme-btn" onclick="toggleTheme()">Switch Theme</button>
    </nav>

    <section class="hero-container">
        <div class="hero-text">
            <h1 class="reveal">Digital.<br>Coordinates.</h1>
            <p class="reveal" style="color: var(--text-sub); font-size: 18px; max-width: 500px;">Connect with me across the web. I'm active on these frequencies.</p>
        </div>
        <div class="orb-canvas reveal">
            <div class="interactive-blob"></div>
        </div>
    </section>

    <section class="socials-section">
        <p class="reveal" style="text-transform: uppercase; letter-spacing: 2px; color: var(--text-sub); font-weight: 700;">Broadcast Channels</p>
        
        <div class="social-grid" id="socialGrid"></div>
    </section>

    <footer>
        <div class="footer-logo">ZIIPZY</div>
        <div class="reveal">
            <a href="https://github.com/ziipzygaming" class="footer-link">GitHub Profile</a>
            <a href="labs" class="footer-link">Labs</a>
            <a href="socials" class="footer-link">Socials</a>
            <a href="mailto:hello@ziipzy.io" class="footer-link">Contact</a>
        </div>
        <p style="margin-top: 40px; font-size: 12px; opacity: 0.5;">© 2026 Ziipzy Creative. Built with Material 3 Expressive Logic.</p>
    </footer>

    <script>
        const mySocials = [
            {
                title: "TikTok",
                handle: "@ziipzy",
                icon: "fa-brands fa-tiktok",
                url: "https://tiktok.com/@ziipzy"
            },
            {
                title: "Instagram",
                handle: "@chrts",
                icon: "fa-brands fa-instagram",
                url: "https://instagram.com/chrts"
            },
            {
                title: "YouTube",
                handle: "@ziipzygaming",
                icon: "fa-brands fa-youtube",
                url: "https://www.youtube.com/@ziipzygaming"
            },
            {
                title: "Facebook",
                handle: "Silver SIlou Aguilar Quijano",
                icon: "fa-brands fa-facebook",
                url: "https://facebook.com/ziipzy"
            }
        ];

        function renderSocials() {
            const container = document.getElementById('socialGrid');
            container.innerHTML = mySocials.map(link => `
                <a href="${link.url}" target="_blank" class="social-card reveal">
                    <i class="${link.icon} social-icon"></i>
                    <div>
                        <h3>${link.title}</h3>
                        <p class="social-handle">${link.handle}</p>
                    </div>
                </a>
            `).join('');
            
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        window.addEventListener('load', () => {
            renderSocials();
            setTimeout(() => { document.body.classList.add('loaded'); }, 1000);
        });

        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);

        function toggleTheme() {
            const current = html.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
    </script>
</body>
</html>
